<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Publicado! – LinkedIn Post Generator</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="#0A66C2" width="36" height="36"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        <span>Post Generator</span>
      </div>
    </header>

    <main class="success-main">
      <div class="success-icon">🎉</div>
      <h1>Post publicado com sucesso!</h1>
      {% if post_id %}
      <p class="subtitle">ID do post: <code>{{ post_id }}</code></p>
      {% endif %}

      <div class="post-preview">
        <h3>O que foi publicado:</h3>
        <pre class="post-text">{{ post_text }}</pre>
      </div>

      <a href="/" class="btn-primary">Criar outro post</a>
    </main>
  </div>
</body>
</html>
