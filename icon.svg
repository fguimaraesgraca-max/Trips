<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C4B5"/>
      <stop offset="100%" stop-color="#0E8A7C"/>
    </linearGradient>
    <linearGradient id="case" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8B930"/>
      <stop offset="100%" stop-color="#F5D060"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- Dune wave at bottom -->
  <path d="M0 165 Q50 148 100 165 Q150 182 200 165 L200 200 L0 200 Z" fill="rgba(255,255,255,0.12)"/>
  <path d="M0 178 Q50 165 100 178 Q150 191 200 178 L200 200 L0 200 Z" fill="rgba(255,255,255,0.08)"/>

  <!-- Handle -->
  <path d="M76 88 L76 72 Q76 58 89 58 L111 58 Q124 58 124 72 L124 88"
        fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Suitcase body -->
  <rect x="38" y="88" width="124" height="78" rx="12" fill="url(#case)"/>
  <rect x="38" y="88" width="124" height="78" rx="12" fill="none" stroke="#C49B00" stroke-width="2.5"/>

  <!-- Straps -->
  <line x1="38" y1="113" x2="162" y2="113" stroke="#B8900A" stroke-width="2" opacity="0.5"/>
  <line x1="38" y1="148" x2="162" y2="148" stroke="#B8900A" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="88" x2="100" y2="166" stroke="#B8900A" stroke-width="2" opacity="0.4"/>

  <!-- Lock -->
  <rect x="87" y="109" width="26" height="16" rx="4" fill="#B8900A"/>
  <rect x="92" y="113" width="16" height="8" rx="2" fill="#F5D060"/>
  <circle cx="100" cy="117" r="3" fill="#B8900A"/>

  <!-- Sticker: green wave (water/Lençóis) -->
  <circle cx="59" cy="100" r="11" fill="#27AE60" stroke="white" stroke-width="2"/>
  <path d="M52 100 Q55.5 96 59 100 Q62.5 104 66 100" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M52 103.5 Q55.5 99.5 59 103.5 Q62.5 107.5 66 103.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Sticker: orange plane -->
  <circle cx="141" cy="100" r="11" fill="#E67E22" stroke="white" stroke-width="2"/>
  <path d="M134 100 L141 94 L148 100 L145 100 L145 106 L141 104 L137 106 L137 100 Z" fill="white"/>

  <!-- Sticker: red heart -->
  <circle cx="59" cy="155" r="11" fill="#E74C3C" stroke="white" stroke-width="2"/>
  <path d="M59 161 L51 153 Q51 147 55.5 147 Q59 147 59 150.5 Q59 147 62.5 147 Q67 147 67 153 Z" fill="white"/>

  <!-- Sticker: blue star -->
  <circle cx="141" cy="155" r="11" fill="#2E86DE" stroke="white" stroke-width="2"/>
  <polygon points="141,146 143,152 149,152 144,156 146,162 141,158 136,162 138,156 133,152 139,152" fill="white"/>
</svg>
